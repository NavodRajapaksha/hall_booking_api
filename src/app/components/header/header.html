<nav class="navbar navbar-expand-lg" style="background:#1a1a2e; padding: 0.8rem 2rem;">
  
  <!-- Brand -->
  <a class="navbar-brand d-flex align-items-center gap-2" href="#">
    <span style="font-size:1.4rem;">🏛️</span>
    <span style="color:#fff; font-weight:700; font-size:1.1rem; letter-spacing:0.3px;">
      Hall Booking
    </span>
  </a>

  <!-- Right side -->
  <div class="ms-auto d-flex align-items-center gap-3">

    <ng-container *ngIf="isLoggedIn()">
      <!-- Nav links -->
      <a routerLink="/halls"
         style="color:#ccc; text-decoration:none; font-size:0.9rem; font-weight:500;"
         onmouseover="this.style.color='#fff'"
         onmouseout="this.style.color='#ccc'">
        🏛️ Halls
      </a>

      <!-- Logout button -->
      <button 
        (click)="logout()"
        style="background:transparent; border:1px solid #555; color:#ccc; 
               border-radius:8px; padding:0.4rem 1rem; font-size:0.85rem;
               cursor:pointer; transition:all 0.2s;"
        onmouseover="this.style.borderColor='#fff'; this.style.color='#fff'"
        onmouseout="this.style.borderColor='#555'; this.style.color='#ccc'">
        Logout
      </button>
    </ng-container>

    <ng-container *ngIf="!isLoggedIn()">
      <a routerLink="/login"
         style="color:#ccc; text-decoration:none; font-size:0.9rem; font-weight:500;">
        Login
      </a>
    </ng-container>

  </div>
</nav>
