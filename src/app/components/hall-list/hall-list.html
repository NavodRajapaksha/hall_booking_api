<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 style="margin:0; font-weight:700; color:#1a1a2e;">🏛️ Hall Management</h4>
    <button (click)="addHall()"
      style="background:#1a1a2e; color:#fff; border:none;
             border-radius:10px; padding:0.55rem 1.2rem;
             font-size:0.9rem; font-weight:600; cursor:pointer;">
      ➕ Add Hall
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border" style="color:#1a1a2e;"></div>
    <p class="mt-2" style="color:#888;">Loading halls...</p>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <!-- Empty -->
  <div *ngIf="!loading && halls.length === 0" class="text-center py-5">
    <p style="font-size:3rem;">🏛️</p>
    <p style="color:#888;">No halls found. Add your first hall!</p>
  </div>

  <!-- Hall Cards -->
  <div class="row g-3" *ngIf="!loading && halls.length > 0">
    <div class="col-md-6 col-lg-4" *ngFor="let hall of halls">
      <div class="card border-0 shadow-sm h-100" style="border-radius:16px;">
        <div class="card-body p-3">

          <!-- Hall Name & Location -->
          <h6 style="font-weight:700; color:#1a1a2e; margin-bottom:0.2rem;">
            {{ hall.name }}
          </h6>
          <p style="font-size:0.82rem; color:#888; margin-bottom:0.8rem;">
            📍 {{ hall.location }}
          </p>

          <!-- Capacity -->
          <div class="d-flex align-items-center gap-1 mb-3">
            <span style="font-size:0.85rem;">👥</span>
            <span style="font-size:0.85rem; color:#555;">
              Capacity: <strong>{{ hall.capacity }}</strong>
            </span>
          </div>

          <!-- Facilities -->
          <div class="d-flex gap-2 flex-wrap mb-3">
            <span *ngIf="hall.hasProjector" class="badge-facility">📽️ Projector</span>
            <span *ngIf="hall.hasAc" class="badge-facility">❄️ AC</span>
            <span *ngIf="hall.hasWhiteboard" class="badge-facility">📋 Whiteboard</span>
            <span *ngIf="!hall.hasProjector && !hall.hasAc && !hall.hasWhiteboard"
              style="font-size:0.78rem; color:#bbb;">No facilities listed</span>
          </div>

          <!-- Edit Button -->
          <button (click)="editHall(hall.id)"
            style="width:100%; background:#f5f5fa; border:none;
                   border-radius:8px; padding:0.45rem;
                   font-size:0.85rem; font-weight:600;
                   color:#1a1a2e; cursor:pointer; transition:background 0.2s;"
            onmouseover="this.style.background='#e8eaf6'"
            onmouseout="this.style.background='#f5f5fa'">
            ✏️ Edit
          </button>

        </div>
      </div>
    </div>
  </div>

</div>
