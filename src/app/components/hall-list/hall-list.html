<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Hall Management</h2>

    <button
      class="btn btn-primary"
      (click)="addHall()">

      Add Hall

    </button>

  </div>

  <div *ngIf="loading" class="text-center mt-5">

    <div class="spinner-border"></div>

    <p class="mt-3">
      Loading halls...
    </p>

  </div>

  <div *ngIf="!loading">

    <table class="table table-bordered table-hover">

      <thead class="table-dark">

        <tr>
          <th>Name</th>
          <th>Location</th>
          <th>Capacity</th>
          <th>Projector</th>
          <th>AC</th>
          <th>Whiteboard</th>
          <th>Action</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let hall of halls">

          <td>{{ hall.name }}</td>
          <td>{{ hall.location }}</td>
          <td>{{ hall.capacity }}</td>

          <td>
            {{ hall.hasProjector ? 'Yes' : 'No' }}
          </td>

          <td>
            {{ hall.hasAc ? 'Yes' : 'No' }}
          </td>

          <td>
            {{ hall.hasWhiteboard ? 'Yes' : 'No' }}
          </td>

          <td>

            <button
              class="btn btn-warning btn-sm"
              (click)="editHall(hall.id)">

              Edit

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
